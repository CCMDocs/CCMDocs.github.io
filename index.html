<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Document Search</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f7f6; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #333; }
        .search-box { width: 100%; padding: 12px; font-size: 16px; border: 1px solid #ccc; border-radius: 4px; margin-bottom: 20px; box-sizing: border-box; }
        .result-card { border: 1px solid #e0e0e0; padding: 15px; margin-bottom: 15px; border-radius: 5px; background-color: #fafafa; }
        .result-title { font-size: 18px; color: #0056b3; text-decoration: none; font-weight: bold; }
        .result-title:hover { text-decoration: underline; }
        .result-meta { font-size: 12px; color: #666; margin: 5px 0; font-weight: bold; }
        .result-desc { font-size: 14px; color: #333; }
        #no-results { display: none; color: red; text-align: center; }
        #loading { text-align: center; color: #666; font-style: italic; }
    </style>
</head>
<body>

<div class="container">
    <h1>Team Document Search</h1>
    <input type="text" id="searchInput" class="search-box" placeholder="Search for keywords (e.g., Trouble opening VOB)..." onkeyup="searchDocs()">
    
    <p id="loading">Loading documents from Google Sheets...</p>
    <div id="results"></div>
    <p id="no-results">No documents found matching your search.</p>
</div>

<script>
    // ⚠️ PASTE YOUR SHEET ID HERE:
    const sheetId = '1BmDtiQz_rZYYZISkNieSec2ZfFaTg2Ka8y7YhraZwtI'; 
    
    const sheetUrl = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json`;
    let documents = [];

    // Fetch the data from Google Sheets when the page loads
    fetch(sheetUrl)
        .then(response => response.text())
        .then(data => {
            const jsonString = data.substring(47).slice(0, -2);
            const jsonData = JSON.parse(jsonString);
            
            documents = jsonData.table.rows.map(row => {
                return {
                    docId: row.c[0] ? row.c[0].v : '',
                    title: row.c[1] ? row.c[1].v : '',
                    link: row.c[2] ? row.c[2].v : '',
                    description: row.c[3] ? row.c[3].v : ''
                };
            });

            document.getElementById('loading').style.display = 'none';
        })
        .catch(error => {
            console.error('Error loading documents:', error);
            document.getElementById('loading').innerText = "Error loading data. Check your Sheet ID and permissions.";
        });

    // Upgraded Smart Keyword Search
    function searchDocs() {
        const query = document.getElementById('searchInput').value.toLowerCase().trim();
        const resultsContainer = document.getElementById('results');
        const noResultsMsg = document.getElementById('no-results');
        
        resultsContainer.innerHTML = '';

        if (query === '') {
            noResultsMsg.style.display = 'none';
            return;
        }

        // Split the user's search into individual keywords (ignoring extra spaces)
        const keywords = query.split(/\s+/);

        const filteredDocs = documents.filter(doc => {
            // Combine Title, Description, and Doc ID into one giant searchable string
            const combinedText = `${doc.title} ${doc.description} ${doc.docId}`.toLowerCase();
            
            // Check if ALL of the typed keywords exist SOMEWHERE in this combined string
            return keywords.every(keyword => combinedText.includes(keyword));
        });

        if (filteredDocs.length > 0) {
            noResultsMsg.style.display = 'none';
            filteredDocs.forEach(doc => {
                const docElement = document.createElement('div');
                docElement.classList.add('result-card');
                docElement.innerHTML = `
                    <a href="${doc.link}" target="_blank" class="result-title">${doc.title}</a>
                    <div class="result-meta">Doc ID: ${doc.docId}</div>
                    <div class="result-desc">${doc.description}</div>
                `;
                resultsContainer.appendChild(docElement);
            });
        } else {
            noResultsMsg.style.display = 'block';
        }
    }
</script>

</body>
</html>
